<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Reality Check!</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f6f6f6;
    margin: 0;
}

.contact-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.contact-card {
    display: flex;
    align-items: center;
    gap: 30px;
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.profile-pic {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
}

.contact-text h2 {
    margin: 0;
    font-size: 28px;
}

.contact-text p {
    margin: 6px 0;
    font-size: 16px;
}

.contact-text a {
    color: #0077cc;
    text-decoration: none;
}

.contact-text a:hover {
    text-decoration: underline;
}

/* Mobile */
@media (max-width: 700px) {
    .contact-card {
        flex-direction: column;
        text-align: center;
    }
}
</style>
</head>

<body>

<div class="contact-container">
    <div class="contact-card">

        <img src="images/nichole.jpg" alt="Nichole Losh" class="profile-pic">

        <div class="contact-text">
            <h2>Nichole Losh</h2>
            <p>Digital Marketing Major</p>
            <p>Email: <a href="mailto:niclosh@uat.edu">niclosh@uat.edu</a></p>
        </div>

    </div>
</div>

</body>
</html>
