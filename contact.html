<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Reality Check!</title>

<style>

/* GENERAL */
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background-color:#f5f5f5;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:white;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

/* LOGO */
.logo img{
    height:55px;
    border-radius:10px;
}

/* NAVIGATION */
nav a{
    margin-left:25px;
    text-decoration:none;
    color:#333;
    font-size:16px;
}

nav a:hover{
    color:#000;
}

/* ACTIVE PAGE */
nav a.active{
    font-weight:bold;
    border-bottom:2px solid black;
}

/* CONTACT SECTION */

.contact-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:70vh;
}

.contact-card{
    display:flex;
    align-items:center;
    gap:35px;
    background:white;
    padding:45px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.profile-pic{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
}

.contact-text h2{
    margin:0;
    font-size:28px;
}

.contact-text p{
    margin:6px 0;
    color:#555;
}

/* FOOTER */

footer{
    text-align:center;
    padding:20px;
    background:#222;
    color:white;
    margin-top:40px;
}

/* MOBILE */

@media (max-width:768px){

.contact-card{
    flex-direction:column;
    text-align:center;
}

nav{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

nav a{
    margin:10px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="images/logo.png" alt="Reality Check Logo">
</div>

<nav>

<a href="portfolio.html">Portfolio</a>

<a href="about.html">About</a>
<a href="sip.html">SIP</a>
<a href="contact.html" class="active">Contact</a>
</nav>

</header>

<section class="contact-container">

<div class="contact-card">

<img src="images/nichole.png" alt="Nichole Losh" class="profile-pic">

<div class="contact-text">

<h2>Nichole Losh</h2>

<p>Digital Marketing Major</p>
<p>University of Advancing Technology</p>
<p>Senior Innovation Project – Reality Check!</p>

<p>Email: <a href="mailto:niclosh@uat.edu">niclosh@uat.edu</a></p>

</div>

</div>

</section>

<footer>

<p>© 2026 Nichole Losh | Reality Check! Senior Innovation Project</p>

</footer>

</body>
</html>
